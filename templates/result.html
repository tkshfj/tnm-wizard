{% extends "base.html" %}
{% block title %}診断文{% endblock %}
{% block head_scripts %}
  <script type="module" src="{{ url_for('static', path='copy.js') }}"></script>
{% endblock %}
{% block container_width %}max-w-2xl lg:max-w-3xl{% endblock %}
{% block heading %}診断文{% endblock %}
{% block content %}
  <div class="card bg-base-100 shadow-lg">
    <div class="card-body">
      <textarea id="reportText" class="textarea textarea-bordered w-full" rows="10">{{ report_text }}</textarea>
      <div class="card-actions mt-4">
        <button type="button" id="copyBtn" class="btn btn-primary">クリップボードにコピー</button>
      </div>
      <div class="mt-4 flex gap-4">
        <a href="{{ url_for('show_form', organ=organ) }}" class="link">フォームに戻る</a>
        <a href="{{ url_for('index') }}" class="link">臓器選択に戻る</a>
      </div>
    </div>
  </div>
{% endblock %}
